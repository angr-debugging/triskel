name: Build pytriskel wheels

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Git tag to create/update as a release, e.g. v0.1.0"
        required: true
      target:
        description: "Which platform wheels to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - linux
          - macos-arm64
          - windows
      build-selector:
        description: "cibuildwheel selector, e.g. cp312-*"
        required: true
        default: "cp312-*"

jobs:
  build:
    name: ${{ matrix.os }} wheel
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            cibw_archs: x86_64
          - os: macos-14
            target: macos-arm64
            cibw_archs: arm64
          - os: windows-latest
            target: windows
            cibw_archs: AMD64

    defaults:
      run:
        working-directory: bindings/python

    env:
      CIBW_BUILD: ${{ inputs.build-selector }}
      CIBW_ARCHS_LINUX: x86_64
      CIBW_ARCHS_MACOS: ${{ matrix.cibw_archs }}
      CIBW_ARCHS_WINDOWS: ${{ matrix.cibw_archs }}
      CIBW_SKIP: "*-musllinux*"
      CIBW_BEFORE_ALL_LINUX: yum install -y cairo-devel pkgconfig
      CIBW_BEFORE_BUILD_WINDOWS: python -m pip install delvewheel ninja
      CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: python -m delvewheel repair -w {dest_dir} {wheel}

    steps:
      - name: Check out repository
        if: ${{ inputs.target == 'all' || inputs.target == matrix.target }}
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ inputs.target == 'all' || inputs.target == matrix.target }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install macOS dependencies
        if: ${{ (inputs.target == 'all' || inputs.target == matrix.target) && runner.os == 'macOS' }}
        run: brew install cairo pkg-config

      - name: Set up vcpkg
        if: ${{ (inputs.target == 'all' || inputs.target == matrix.target) && runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $vcpkgRootNative = Join-Path $env:RUNNER_TEMP "vcpkg"
          git clone https://github.com/microsoft/vcpkg.git $vcpkgRootNative
          git -C $vcpkgRootNative checkout 816a52c0fdf574d5ae782bbd2db2c8e87b3aeb8d
          & "$vcpkgRootNative\bootstrap-vcpkg.bat"
          $vcpkgRoot = $vcpkgRootNative.Replace('\', '/')
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CMAKE_TOOLCHAIN_FILE=$vcpkgRoot/scripts/buildsystems/vcpkg.cmake" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_INSTALLED_DIR=$vcpkgRoot/installed" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_BIN_DIR=$vcpkgRoot/installed/x64-windows/bin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Windows dependencies
        if: ${{ (inputs.target == 'all' || inputs.target == matrix.target) && runner.os == 'Windows' }}
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install cairo:x64-windows

      - name: Build wheels
        if: ${{ inputs.target == 'all' || inputs.target == matrix.target }}
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_ENVIRONMENT_MACOS: >-
            MACOSX_DEPLOYMENT_TARGET=14.0
          CIBW_ENVIRONMENT_WINDOWS: >-
            VCPKG_ROOT="${{ env.VCPKG_ROOT }}"
            CMAKE_TOOLCHAIN_FILE="${{ env.CMAKE_TOOLCHAIN_FILE }}"
            VCPKG_INSTALLED_DIR="${{ env.VCPKG_INSTALLED_DIR }}"
            PATH="${{ env.VCPKG_BIN_DIR }};$PATH"
            VCPKG_TARGET_TRIPLET=x64-windows
            CMAKE_GENERATOR=Ninja
        with:
          package-dir: bindings/python

      - name: Upload wheel artifacts
        if: ${{ inputs.target == 'all' || inputs.target == matrix.target }}
        uses: actions/upload-artifact@v4
        with:
          name: pytriskel-${{ matrix.target }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ inputs.target == 'all' && success() }}
    permissions:
      contents: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          pattern: pytriskel-*
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release-tag }}
          name: ${{ inputs.release-tag }}
          files: dist-artifacts/*.whl
          generate_release_notes: true
