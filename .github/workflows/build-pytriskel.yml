name: Build pytriskel wheels

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Git tag to create/update as a release, e.g. v0.1.0"
        required: true
      build-selector:
        description: "cibuildwheel selector, e.g. cp312-*"
        required: true
        default: "cp312-*"

jobs:
  build:
    name: ${{ matrix.os }} wheel
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    defaults:
      run:
        working-directory: bindings/python

    env:
      CIBW_BUILD: ${{ inputs.build-selector }}
      CIBW_ARCHS_LINUX: x86_64
      CIBW_ARCHS_MACOS: x86_64 arm64
      CIBW_ARCHS_WINDOWS: AMD64
      CIBW_SKIP: pp* *-musllinux*
      CIBW_BEFORE_ALL_LINUX: yum install -y cairo-devel pkgconfig
      CIBW_BEFORE_BUILD_WINDOWS: python -m pip install delvewheel
      CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: python -m delvewheel repair -w {dest_dir} {wheel}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cairo pkg-config

      - name: Set up vcpkg
        if: runner.os == 'Windows'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 816a52c0fdf574d5ae782bbd2db2c8e87b3aeb8d

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: vcpkg install cairo:x64-windows

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_ENVIRONMENT_WINDOWS: >-
            CMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}\scripts\buildsystems\vcpkg.cmake
            VCPKG_INSTALLED_DIR=${{ env.VCPKG_ROOT }}\installed
            VCPKG_TARGET_TRIPLET=x64-windows

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pytriskel-${{ matrix.os }}
          path: libs/triskel/bindings/python/wheelhouse/*.whl
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          pattern: pytriskel-*
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release-tag }}
          name: ${{ inputs.release-tag }}
          files: dist-artifacts/*.whl
          generate_release_notes: true
