name: Build pytriskel wheels

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Git tag to create/update as a release, e.g. v0.1.0"
        required: true
      target:
        description: "Which platform wheels to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - linux
          - macos-arm64
          - windows
      build-selector:
        description: "cibuildwheel selector, e.g. cp312-*"
        required: true
        default: "cp312-*"

jobs:
  build:
    name: ${{ matrix.os }} wheel
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            cibw_archs: x86_64
          - os: macos-14
            target: macos-arm64
            cibw_archs: arm64
          - os: windows-latest
            target: windows
            cibw_archs: AMD64

    defaults:
      run:
        working-directory: bindings/python

    env:
      CIBW_BUILD: ${{ inputs.build-selector }}
      CIBW_ARCHS_LINUX: x86_64
      CIBW_ARCHS_MACOS: ${{ matrix.cibw_archs }}
      CIBW_ARCHS_WINDOWS: ${{ matrix.cibw_archs }}
      CIBW_SKIP: "*-musllinux*"
      CIBW_BEFORE_BUILD_WINDOWS: python -m pip install ninja
      CIBW_REPAIR_WHEEL_COMMAND_LINUX: ""
      CIBW_REPAIR_WHEEL_COMMAND_MACOS: ""
      CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: ""
      CIBW_TEST_COMMAND: python -c "import pytriskel.pytriskel; from pytriskel import make_layout_builder"

    steps:
      - name: Check out repository
        if: ${{ inputs.target == 'all' || inputs.target == matrix.target }}
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ inputs.target == 'all' || inputs.target == matrix.target }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        if: ${{ inputs.target == 'all' || inputs.target == matrix.target }}
        uses: pypa/cibuildwheel@v3.4.0
        with:
          package-dir: bindings/python

      - name: Upload wheel artifacts
        if: ${{ inputs.target == 'all' || inputs.target == matrix.target }}
        uses: actions/upload-artifact@v4
        with:
          name: pytriskel-${{ matrix.target }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ success() }}
    permissions:
      contents: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          pattern: pytriskel-*
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release-tag }}
          name: ${{ inputs.release-tag }}
          files: dist-artifacts/*.whl
          generate_release_notes: true
